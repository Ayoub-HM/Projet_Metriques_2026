<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Histogramme meteo Paris</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 24px;
    }

    #chart {
      width: 100%;
      height: 560px;
    }

    #status {
      margin-top: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Previsions Paris - 7 jours (histogramme)</h1>
  <div id="chart"></div>
  <div id="status"></div>

  <script>
    google.charts.load("current", { packages: ["corechart"] });
    google.charts.setOnLoadCallback(init);

    let cachedRows = null;

    async function init() {
      try {
        const rows = await fetchDailyParisData();
        cachedRows = rows;
        drawChart(rows);

        window.addEventListener("resize", () => {
          if (cachedRows) drawChart(cachedRows);
        });
      } catch (error) {
        showStatus("Erreur: " + (error?.message || error));
        console.error(error);
      }
    }

    async function fetchDailyParisData() {
      const response = await fetch("/paris", {
        headers: { Accept: "application/json" }
      });

      if (!response.ok) {
        throw new Error("HTTP " + response.status + " sur /paris");
      }

      const raw = await response.json();
      const byDay = new Map();

      for (const point of raw) {
        const iso = String(point.datetime || "");
        const date = iso.split("T")[0];
        const temp = Number(point.temperature_c);

        if (!date || Number.isNaN(temp)) continue;

        if (!byDay.has(date)) {
          byDay.set(date, { sum: 0, count: 0 });
        }

        const agg = byDay.get(date);
        agg.sum += temp;
        agg.count += 1;
      }

      const days = Array.from(byDay.keys()).sort().slice(0, 7);
      const rows = days.map((day) => {
        const agg = byDay.get(day);
        const avg = agg.sum / agg.count;
        return [formatDay(day), Number(avg.toFixed(1))];
      });

      if (rows.length === 0) {
        throw new Error("Aucune donnee exploitable recue depuis /paris");
      }

      return rows;
    }

    function formatDay(isoDate) {
      const [year, month, day] = isoDate.split("-");
      return day + "/" + month + "/" + year;
    }

    function drawChart(rows) {
      const data = new google.visualization.DataTable();
      data.addColumn("string", "Jour");
      data.addColumn("number", "Temp moyenne (C)");
      data.addRows(rows);

      const options = {
        title: "Temperature moyenne journaliere a Paris",
        legend: { position: "none" },
        colors: ["#2a9d8f"],
        hAxis: {
          title: "Date"
        },
        vAxis: {
          title: "Temperature (C)"
        }
      };

      const chart = new google.visualization.ColumnChart(
        document.getElementById("chart")
      );
      chart.draw(data, options);

      showStatus("OK - " + rows.length + " jours charges depuis /paris");
    }

    function showStatus(message) {
      document.getElementById("status").textContent = message;
    }
  </script>
</body>
</html>
